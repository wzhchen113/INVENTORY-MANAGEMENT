# .github/workflows/e2e.yml — Spec 078, Track 4 (browser E2E / Playwright).
#
# SEPARATE from test.yml and NON-BLOCKING in v1 (locked decision #2). It
# runs on PRs and pushes to `main` as an ADVISORY signal — it is NOT a
# required status check yet, and a red run does NOT block merge or
# SHIP_READY (the CLAUDE.md "CI status check" rule is scoped to test.yml
# only). There is nothing in this YAML that makes it "non-blocking" — that
# is a repo branch-protection fact; this file just runs the suite.
#
# PROMOTION-TO-REQUIRED CRITERIA (AC-PROMO1 — the gating-flip rule):
# promote e2e.yml to a required status check only when BOTH hold, on the
# user's call:
#   - >= 20 consecutive green e2e.yml runs on `main`, AND
#   - observed flake rate < 5% across those runs (a run that goes green
#     only on a Playwright retry counts as a flake; `trace: 'on-first-retry'`
#     makes retries visible in the uploaded report).
# When promoted, the follow-up adds it to the required-checks set and
# extends the CLAUDE.md CI rule to name e2e.yml. Until then it is advisory.
#
# Mirrors test.yml's `db` job for the stack boot + the
# FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 opt-in (spec 047) + least-privilege
# permissions. Adds the chromium binary install and an `if: always()`
# artifact upload (HTML report + traces).

name: e2e

on:
  push:
  pull_request:

# Least-privilege: the job only reads source + runs tests. No write scope.
permissions:
  contents: read

# Opt JS-based GitHub Actions into the Node 24 action runtime ahead of
# GitHub's force-default — matches test.yml (spec 047). Independent of the
# project Node version installed via setup-node below.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    name: Track 4 — Playwright (web)
    runs-on: ubuntu-latest
    # Generous budget: supabase cold-boot (~60-90s) + db reset (reseed of
    # the 286 KB seed) + cold Metro bundle + the serial suite.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase stack
        run: supabase start

      - name: Reset DB to committed seed
        # OQ-3(a): clean, deterministic seed every CI run so invite-list and
        # audit-log assertions don't accumulate drift across runs.
        run: supabase db reset

      - name: Export local stack keys for the OQ-4 fixture
        # The e2e/global-setup.ts fixture inserts order_schedule rows via a
        # service-role client. Parse the LOCAL stack's well-known keys out
        # of `supabase status -o env` and expose them to later steps. These
        # are the local demo keys, NOT prod secrets — they are safe to
        # surface in CI logs, but we still avoid echoing the values (we pipe
        # straight into $GITHUB_ENV).
        #
        # CRITICAL: `supabase status -o env` emits QUOTED values, e.g.
        #   SERVICE_ROLE_KEY="eyJ..."
        # Piping that line verbatim into $GITHUB_ENV carries the literal
        # double-quotes INTO the env var, so the fixture's bearer token
        # becomes `"eyJ..."` (quotes included) and PostgREST rejects it with
        # "JWT cryptographic operation failed" (the spec 078 first-CI-run
        # failure). The sed strips the surrounding quotes so the env var
        # holds the bare JWT. Version-robust: keyed on the `KEY="value"`
        # shape, not a specific CLI version.
        run: |
          supabase status -o env \
            | grep -E '^(ANON_KEY|SERVICE_ROLE_KEY)=' \
            | sed -E 's/^([A-Za-z_]+)="(.*)"$/\1=\2/' \
            >> "$GITHUB_ENV"

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        run: npm run e2e
        env:
          CI: true
          # The OQ-4 fixture reads SUPABASE_SERVICE_ROLE_KEY; map the local
          # stack's SERVICE_ROLE_KEY (exported above) onto it. The web
          # server's EXPO_PUBLIC_* vars default to the local stack inside
          # playwright.config.ts.
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SERVICE_ROLE_KEY }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ env.ANON_KEY }}

      - name: Upload Playwright report + traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Stop Supabase stack
        if: always()
        run: supabase stop --no-backup
