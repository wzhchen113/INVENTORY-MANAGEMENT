# .github/workflows/test.yml — Spec 022 (test framework intro)
# + Spec 024 (typecheck:test gate) + Spec 025 (base typecheck gate).
#
# Four jobs:
#   1. jest           — Track 1 (JS/TS unit + component tests via
#                       jest-expo).
#   2. typecheck      — Track 1a (Spec 024) — `tsc --noEmit -p
#                       tsconfig.test.json`. Gates the test-reachable
#                       slice of the non-legacy graph.
#   3. typecheck-base — Track 1b (Spec 025) — `tsc --noEmit` on the
#                       base config. Gates the full active app graph
#                       (excludes supabase/functions, scripts, and
#                       tests/test files per tsconfig.json `exclude`).
#                       Closes the Spec 024 §Q5a corollary coverage gap
#                       on the four Cmd UI component files surfaced
#                       only by the base graph.
#   4. db             — Track 2 (Supabase DB tests via psql + pgTAP).
#
# Track 3 (shell smokes under scripts/smoke-*.sh) is NOT wired in here
# per spec AC — smoke scripts stay manual-run in v1 to match the
# existing smoke-edge.sh posture.
#
# Architect's design (spec 022 §6): the `db` job boots the full local
# Supabase stack via `supabase/setup-cli@v1` + `supabase start` because
# DB tests touch `auth.uid()` which a bare Postgres service container
# does not expose. ~60-90s cold-boot is acceptable for the v1 cadence.

name: test

on:
  push:
  pull_request:

# Least-privilege default. Neither job needs to write anything — they
# only read source + run tests. Closes security-auditor M1.
permissions:
  contents: read

# Opt JS-based GitHub Actions (actions/checkout@v4, actions/setup-node@v4,
# supabase/setup-cli@v1) into the Node 24 action runtime ahead of GitHub's
# ~June 2, 2026 force-default. This flag is read by the runner before it
# decides which Node binary to invoke for any `runs.using: node20` action;
# it does NOT change the project Node version we install via setup-node
# (still `node-version: '20'` below — that's our app's Node, not the
# action's Node — they're independent). See spec 047.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  jest:
    name: Track 1 — jest-expo
    runs-on: ubuntu-latest
    # Without a job-level timeout the run defaults to 6 hours, so any
    # hung worker (transformIgnorePatterns regression, etc.) burns CI
    # minutes for hours. Closes code-reviewer S2 + test-engineer.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run jest
        run: npm test -- --ci

  typecheck:
    name: Track 1a — typecheck (test graph)
    runs-on: ubuntu-latest
    # Typecheck on the test-reachable slice. Cold-start is faster than
    # jest's; 10 minutes is generous.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (test config + transitively-reached non-legacy graph)
        run: npm run typecheck:test

  typecheck-base:
    name: Track 1b — typecheck (full base graph)
    runs-on: ubuntu-latest
    # Base typecheck (Spec 025). Covers the full active app graph
    # (excludes supabase/functions, scripts, and tests/test files per
    # tsconfig.json `exclude`). Cold-start matches the Track 1a job.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (base config — full active app graph)
        run: npm run typecheck

  db:
    name: Track 2 — Supabase DB tests
    runs-on: ubuntu-latest
    # `supabase start` cold-boot is ~60-90s; tests themselves are fast.
    # 20 min covers boot variance + a generous test-runtime budget.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Pinned to 2.106.0 — the FIRST CLI family whose bundled Postgres image
          # revokes the implicit `GRANT ... ON public.* TO {anon, authenticated,
          # service_role}` (that revoke broke 34/46 pgTAP files with permission
          # denied when `latest` floated 2.105.0 -> 2.106.0). Grants are now
          # SCHEMA-EXPLICIT via migration 20260618000000_public_grants_explicit.sql,
          # so this image passes all pgTAP files. The pin was moved forward
          # DELIBERATELY (spec 097) to 2.106.0 to prove the durable fix against the
          # exact image that revokes the defaults — a green Track 2 here is the
          # load-bearing evidence the explicit grants work. It is fixed (not
          # `latest`) so a future CLI release can't silently re-perturb that proof;
          # bump it in its own one-line PR whose green Track 2 re-proves the
          # posture. See CLAUDE.md §"CI status check after every push to main".
          version: 2.106.0

      - name: Start Supabase stack
        # Brings up Postgres + Auth + Realtime + ... so tests can use
        # auth.uid() via JWT claim injection.
        run: supabase start

      - name: Run DB tests
        # The wrapper script discovers .test.sql files under
        # supabase/tests/ and runs each through `docker exec ... psql -f`.
        # Container name defaults to `supabase_db_<project_id>`, matching
        # what `supabase start` brings up.
        run: npm run test:db

      - name: Stop Supabase stack
        if: always()
        run: supabase stop --no-backup
