<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>C · Command — Screens</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
<style>
  html, body { margin:0; padding:0; height:100%; background:#E9E7E1; font-family:"Inter Tight",system-ui,sans-serif; }
  * { box-sizing:border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="screens-chrome.jsx"></script>
<script type="text/babel" src="screens-ops.jsx"></script>
<script type="text/babel" src="screens-planning.jsx"></script>
<script type="text/babel" src="screens-insights.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { TweaksPanel, useTweaks, TweakSection, TweakRadio } = window;
const { CmdChrome } = window;

const SCREENS = [
  { id:'dashboard',    section:'Dashboard',       slug:'dashboard',       Comp: window.ScreenDashboard },
  { id:'eod',          section:'EOD count',       slug:'eod-count',       Comp: window.ScreenEOD },
  { id:'waste',        section:'Waste log',       slug:'waste-log',       Comp: window.ScreenWaste },
  { id:'receiving',    section:'Receiving',       slug:'receiving',       Comp: window.ScreenReceiving },
  { id:'pos',          section:'Purchase orders', slug:'purchase-orders', Comp: window.ScreenPOs },
  { id:'vendors',      section:'Vendors',         slug:'vendors',         Comp: window.ScreenVendors },
  { id:'recipes',      section:'Recipes',         slug:'recipes',         Comp: window.ScreenRecipes },
  { id:'restock',      section:'Restock',         slug:'restock',         Comp: window.ScreenRestock },
  { id:'recon',        section:'Reconciliation',  slug:'reconciliation',  Comp: window.ScreenReconciliation },
  { id:'posimp',       section:'POS imports',     slug:'pos-imports',     Comp: window.ScreenPOSImports },
  { id:'audit',        section:'Audit log',       slug:'audit-log',       Comp: window.ScreenAuditLog },
  { id:'reports',      section:'Reports',         slug:'reports',         Comp: window.ScreenReports },
];

function App() {
  const [tw, setTw] = useTweaks(/*EDITMODE-BEGIN*/{}/*EDITMODE-END*/);
  const dark = tw.theme === 'dark';

  return (
    <div style={{ position:'relative', width:'100%', height:'100%' }}>
      <DesignCanvas defaultZoom={0.55} bg="#E9E7E1">
        <DCSection id="ops" title="Operations">
          {SCREENS.slice(0,4).map(s => (
            <DCArtboard key={s.id} id={s.id} label={s.section} width={1280} height={820}>
              <CmdChrome dark={dark} section={s.section} breadcrumbSlug={s.slug}>
                <s.Comp dark={dark} />
              </CmdChrome>
            </DCArtboard>
          ))}
        </DCSection>
        <DCSection id="planning" title="Planning">
          {SCREENS.slice(4,8).map(s => (
            <DCArtboard key={s.id} id={s.id} label={s.section} width={1280} height={820}>
              <CmdChrome dark={dark} section={s.section} breadcrumbSlug={s.slug}>
                <s.Comp dark={dark} />
              </CmdChrome>
            </DCArtboard>
          ))}
        </DCSection>
        <DCSection id="insights" title="Insights">
          {SCREENS.slice(8,12).map(s => (
            <DCArtboard key={s.id} id={s.id} label={s.section} width={1280} height={820}>
              <CmdChrome dark={dark} section={s.section} breadcrumbSlug={s.slug}>
                <s.Comp dark={dark} />
              </CmdChrome>
            </DCArtboard>
          ))}
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Theme">
          <TweakRadio value={tw.theme} options={[['light','Light'],['dark','Dark']]} onChange={v => setTw('theme', v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
