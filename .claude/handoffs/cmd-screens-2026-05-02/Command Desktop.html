<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>C · Command — Desktop</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
<style>
  html, body { margin:0; padding:0; height:100%; background:#E9E7E1; font-family:"Inter Tight",system-ui,sans-serif; }
  * { box-sizing:border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="layout-command.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { TweaksPanel, useTweaks, TweakSection, TweakRadio } = window;

const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
  "mode": "both"
}/*EDITMODE-END*/;

function App() {
  const [values, setTweak] = useTweaks(TWEAK_DEFAULS);
  const { mode } = values;
  const showLight = mode === 'light' || mode === 'both';
  const showDark  = mode === 'dark'  || mode === 'both';

  const Frame = ({ dark }) => (
    <div style={{ width:1280, height:820, overflow:'hidden', borderRadius:12, background: dark ? '#08090C' : '#FAFAF8' }}>
      <window.CommandLayout dark={dark} />
    </div>
  );

  return (
    <>
      <DesignCanvas
        title="C · Command — Desktop"
        subtitle="IDE-flavored three-pane: tree-nav sidebar with command palette, filterable item list, rich detail with stat grid, 14-day stock chart vs. par, properties.json, recipe usage, status bar."
      >
        <DCSection id="command" title="Command — 1280 × 820"
          subtitle="Title bar (traffic lights + breadcrumb path) → 240px tree sidebar → 340px item list → flexible detail. Footer = status bar.">
          {showLight && (
            <DCArtboard id="command-light" label="Light" width={1280} height={820}>
              <Frame dark={false} />
            </DCArtboard>
          )}
          {showDark && (
            <DCArtboard id="command-dark" label="Dark" width={1280} height={820}>
              <Frame dark={true} />
            </DCArtboard>
          )}
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Theme">
          <TweakRadio label="Mode" value={mode} onChange={v => setTweak('mode', v)}
            options={[{value:'light', label:'Light'}, {value:'dark', label:'Dark'}, {value:'both', label:'Both'}]} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
