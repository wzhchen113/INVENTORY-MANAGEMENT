<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>C · Command — Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
<style>
  html, body { margin:0; padding:0; height:100%; background:#E9E7E1; font-family:"Inter Tight",system-ui,sans-serif; }
  * { box-sizing:border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="layout-command-mobile.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { TweaksPanel, useTweaks, TweakSection, TweakRadio } = window;

const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
  "mode": "both"
}/*EDITMODE-END*/;

function Phone({ Comp, dark, role = 'admin' }) {
  return (
    <window.IOSDevice width={402} height={874} dark={dark}>
      <Comp dark={dark} role={role} />
    </window.IOSDevice>
  );
}

function App() {
  const [values, setTweak] = useTweaks(TWEAK_DEFAULS);
  const { mode } = values;
  const showLight = mode === 'light' || mode === 'both';
  const showDark  = mode === 'dark'  || mode === 'both';

  const variants = [
    { id:'list',   title:'Inventory list',  Comp: window.MobileCmdList,
      sub:'Admin sees full inventory with cost/value filters; staff sees a count_queue scoped to their assigned zone. Same monospace, same status dots — different lens.' },
    { id:'detail', title:'Item detail',     Comp: window.MobileCmdDetail,
      sub:'Admin sees cost / unit, stock value, vendor, full audit log, EDIT button, and the audit.tsx tab. Staff sees last-count + variance (no $), storage location, restricted properties, EDIT replaced with FLAG ISSUE.' },
    { id:'nav',    title:'Tree-nav + ⌘K',   Comp: window.MobileCmdNav,
      sub:'Admin sees Operations / Planning / Insights — full tree. Staff sees Tasks / Reference, with Vendors / Reports / Audit / Reconciliation explicitly listed under a locked Admin-only section. ⌘K palette scope narrows for staff.' },
  ];

  return (
    <>
      <DesignCanvas
        title="C · Command — Mobile · Admin vs Staff"
        subtitle="Same design language, two role permissions side by side. Each row: admin (left) vs staff (right) for that screen."
      >
        {variants.map(v => (
          <DCSection key={v.id} id={v.id} title={v.title} subtitle={v.sub}>
            {showLight && (
              <DCArtboard id={v.id+'-admin-light'} label="Admin · Light" width={402} height={874}>
                <Phone Comp={v.Comp} dark={false} role="admin" />
              </DCArtboard>
            )}
            {showLight && (
              <DCArtboard id={v.id+'-staff-light'} label="Staff · Light" width={402} height={874}>
                <Phone Comp={v.Comp} dark={false} role="staff" />
              </DCArtboard>
            )}
            {showDark && (
              <DCArtboard id={v.id+'-admin-dark'} label="Admin · Dark" width={402} height={874}>
                <Phone Comp={v.Comp} dark={true} role="admin" />
              </DCArtboard>
            )}
            {showDark && (
              <DCArtboard id={v.id+'-staff-dark'} label="Staff · Dark" width={402} height={874}>
                <Phone Comp={v.Comp} dark={true} role="staff" />
              </DCArtboard>
            )}
          </DCSection>
        ))}
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Theme">
          <TweakRadio label="Mode" value={mode} onChange={v => setTweak('mode', v)}
            options={[{value:'light', label:'Light'}, {value:'dark', label:'Dark'}, {value:'both', label:'Both'}]} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
